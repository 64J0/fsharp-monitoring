# https://github.com/vegasbrianc/prometheus/blob/master/docker-compose.yml
# https://docs.docker.com/compose/production/
services:
  postgres:
    image: postgres:17-alpine
    container_name: stocks-postgres
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "256M"
    environment:
      POSTGRES_DB: stocks_db
      POSTGRES_USER: stocks_user
      POSTGRES_PASSWORD: stocks_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocks_user -d stocks_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  db-migrations:
    build:
      context: .
      target: migrations
    container_name: stocks-migrations
    environment:
      - DB_CONNECTION_STRING=Host=postgres;Database=stocks_db;Username=stocks_user;Password=stocks_pass;Port=5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monitoring-network

  fsharp-api-server:
    build:
      context: .
      target: runtime
    container_name: fsharp-api
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "256M"
    environment:
      - HOST=http://0.0.0.0
      - PORT=8085
      - MIN_LOG_LEVEL=INFO
      - DB_CONNECTION_STRING=Host=postgres;Database=stocks_db;Username=stocks_user;Password=stocks_pass;Port=5432
    ports:
      - "8085:8085"
      - "9085:9085"
    networks:
      - monitoring-network
    depends_on:
      db-migrations:
        condition: service_completed_successfully
    restart: always

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: prometheus
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "256M"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.config.file=/etc/prometheus/web.yml"
    networks:
      - monitoring-network
    volumes:
      - ./prometheus/:/etc/prometheus/
      # - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: always

  adminer:
    image: adminer:4-standalone
    container_name: stocks-adminer
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monitoring-network
    ports:
      - "8080:8080"
    restart: always

  grafana:
    image: grafana/grafana:12.0.1-ubuntu
    container_name: grafana
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "256M"
    user: "472"
    depends_on:
      - prometheus
    networks:
      - monitoring-network
    volumes:
      # - grafana_data:/var/lib/grafana
      - ./grafana/:/etc/grafana/provisioning/
    env_file:
      - ./grafana/config.monitoring
    ports:
      - "3000:3000"
    restart: always

networks:
  monitoring-network: {}

volumes:
  postgres_data: {}
  # prometheus_data: {}
  # grafana_data: {}
