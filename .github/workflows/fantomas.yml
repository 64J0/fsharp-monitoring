name: Fantomas CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'fsharp-domain/**'
      - 'fsharp-application/**'
      - 'fsharp-infrastructure/**'
      - 'fsharp-api/**'
      - 'db-migrations/**'
      - 'tests/**'
      - 'load-test/**'
      - 'utils/**'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

# Kill other jobs when we trigger this workflow by sending new commits
# to the PR.
# https://stackoverflow.com/a/72408109
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fantomas-check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Tool Restore
        run: dotnet tool restore

      - name: Check lint for fsharp-domain
        run: dotnet fantomas -r --check ./fsharp-domain/

      - name: Check lint for fsharp-application
        run: dotnet fantomas -r --check ./fsharp-application/

      - name: Check lint for fsharp-infrastructure
        run: dotnet fantomas -r --check ./fsharp-infrastructure/

      - name: Check lint for fsharp-api
        run: dotnet fantomas -r --check ./fsharp-api/

      - name: Check lint for db-migrations
        run: dotnet fantomas -r --check ./db-migrations/

      - name: Check lint for tests
        run: dotnet fantomas -r --check ./tests/

      - name: Check lint for load-test
        run: dotnet fantomas -r --check ./load-test/

      - name: Check lint for utils
        run: dotnet fantomas -r --check ./utils/

